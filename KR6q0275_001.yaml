body:
  text: 滁州琅邪山覺和尚中後四録參學門人用孫序夫宗師之出世居方者抑而為之提綱振維者蓋不得已雖以應其羣心之所來而大抵之得人者其在茲乎故我琅邪禪師之出化也四海雲奔無所不至大音雷發無所不聞其負雄經博論者徑徑勝其數皆匿影吞聲于其左右凡是提唱者各有旨歸蓋以應動觀機事無虗發或滯其語句者則釋其所黏或執其意解者則除其所縛或坐其向上者則掇之於未然或止其中下者則擊之於已兆或補其所闕則正眼具全或刪其所繁則大意不紊皆以離情妄泯智照然後真心現前古今獨耀隨方施設一味齊收猶如曦馭當畫影現無垠觀者四來圓以隨對其可得而盡之乎門人元聚久探師室親承指誨日有升舉即而記之凡百餘則嗣以纂之以閒干前後二録目之為中録於是乎舉前後則中攝矣舉中則前後盡矣非離前後而趣其中非離中而止其前後中則無後前前後則無中師之大旨一以貫之其可得而思之耶設肆目于其間者若游滄海玩群龍之闕俯視珍貝心目燦然不暇應接耳師之生緣受業得法具載之別録不復煩紀所謂開正法眼藏直指以示人者其惟我師
